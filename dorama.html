<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница Дорамы</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .genre-tag {
      display: inline-block;
      background: #333;
      padding: 4px 10px;
      border-radius: 6px;
      margin-right: 5px;
      font-size: 14px;
      color: #ccc;
    }
    .status-block {
      margin-top: 15px;
      padding: 10px;
      background: #222;
      border-radius: 8px;
      font-weight: bold;
    }
    /* Новые стили для отображения сезонов и серий */
    .runtime-box {
      background: #2d2d2d;
      border-left: 4px solid var(--dorama-color);
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    .season-badge {
      display: inline-block;
      background: #444;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 13px;
      margin: 4px;
      color: #fff;
    }
    .total-count-meta {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #00d2d3;
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="back-link">← Вернуться в каталог</a>

    <div class="main-info">
      <img id="doramaBanner" src="" alt="">
      <div class="details">
        <h1 id="doramaTitle" class="dorama-h1">Загрузка...</h1>
        
        <div id="doramaGenres" style="margin-bottom: 15px;"></div>

        <!-- СЮДА БУДУТ ВЫВОДИТЬСЯ СЕЗОНЫ / СЕРИИ ИЛИ ВРЕМЯ ФИЛЬМА -->
        <div id="runtimeInfo"></div>

        <p class="desc" id="doramaDesc"></p>
        
        <div class="rating-block" id="dorama-ratings"></div>

        <div class="status-block">
          Статус просмотра: <span id="doramaStatus" style="color: var(--dorama-color);"></span>
        </div>
      </div>
    </div>

    <h2>Галерея кадров</h2>
    <div class="gallery" id="doramaGallery"></div>

    <div class="reviews-section">
      <h2>Наши отзывы и мнения</h2>
      <div class="review-box">
        <div class="review-author">Коля</div>
        <div id="reviewKolya">Оставь свой отзыв в базе данных...</div>
      </div>
      <div class="review-box">
        <div class="review-author">Ника</div>
        <div id="reviewFriend">Отзыв подруги...</div>
      </div>
    </div>
  </div>

  <div id="imageModal" class="image-modal">
    <img id="modalImg" src="" alt="Просмотр изображения">
  </div>

  <script src="data.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id'));
    const dorama = doramasData.find(d => d.id === id);

    if (dorama) {
      document.documentElement.style.setProperty('--dorama-color', dorama.color);
      document.getElementById('doramaTitle').innerText = dorama.title;
      document.getElementById('doramaDesc').innerText = dorama.description;
      document.getElementById('doramaBanner').src = dorama.banner;
      document.getElementById('doramaStatus').innerText = dorama.status.toUpperCase();

      // Выводим жанры
      const genresContainer = document.getElementById('doramaGenres');
      if(dorama.genres) {
        dorama.genres.forEach(g => {
          const span = document.createElement('span');
          span.className = 'genre-tag';
          span.innerText = g;
          genresContainer.appendChild(span);
        });
      }

      // КРАСИВЫЙ ВЫВОД СЕРИЙ И СЕЗОНОВ / ВРЕМЕНИ ПОЛНОМЕТРАЖКИ
      const runtimeContainer = document.getElementById('runtimeInfo');
      
      if (dorama.type === 'movie') {
        // Если это фильм
        runtimeContainer.innerHTML = `
          <div class="runtime-box">
            <span>🎬 <b>Полнометражный фильм</b></span><br>
            <span style="color: #ccc; font-size: 15px;">Продолжительность: ${dorama.duration || 'Не указана'}</span>
          </div>
        `;
      } else {
        // Если это сериал (по умолчанию, или если type === 'tv')
        const seasonsList = dorama.seasons || [16]; // Защита, если забыли указать
        const totalSeasons = seasonsList.length;
        const totalEpisodes = seasonsList.reduce((sum, current) => sum + current, 0);

        let seasonsHtml = '';
        seasonsList.forEach((epCount, index) => {
          seasonsHtml += `<span class="season-badge">Сезон ${index + 1}: <b>${epCount} сер.</b></span>`;
        });

        runtimeContainer.innerHTML = `
          <div class="runtime-box">
            <div class="total-count-meta">📺 Сериал: ${totalSeasons} ${totalSeasons === 1 ? 'сезон' : totalSeasons < 5 ? 'сезона' : 'сезонов'} (${totalEpisodes} сер. всего)</div>
            <div style="margin-top: 5px;">
              ${seasonsHtml}
            </div>
          </div>
        `;
      }

      renderDoramaRatings(dorama);

      // Работа с модальным окном картинок
      const mainBanner = document.getElementById('doramaBanner');
      if (mainBanner) {
        mainBanner.style.cursor = 'pointer';
        mainBanner.addEventListener('click', () => openModal(mainBanner.src));
      }

      const galleryContainer = document.getElementById('doramaGallery');
      if (dorama.images) {
        dorama.images.forEach(imgUrl => {
          const img = document.createElement('img');
          img.src = imgUrl;
          img.alt = "Кадр из дорамы";
          img.addEventListener('click', () => openModal(imgUrl));
          galleryContainer.appendChild(img);
        });
      }

      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImg');

      function openModal(src) {
        modalImg.src = src;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; 
      }

      modal.addEventListener('click', () => {
        modal.classList.remove('active');
        document.body.style.overflow = ''; 
      });

      // Отзывы
      if (dorama.ourReviews) {
        document.getElementById('reviewKolya').innerText = dorama.ourReviews.kolya || "Пока нет отзыва.";
        document.getElementById('reviewFriend').innerText = dorama.ourReviews.nika || "Пока нет отзыва.";
      } else {
        document.getElementById('reviewKolya').innerText = "Пока нет отзыва.";
        document.getElementById('reviewFriend').innerText = "Пока нет отзыва.";
      }
    } else {
      document.body.innerHTML = "<h1>Дорама не найдена!</h1><a href='index.html'>Назад</a>";
    }
  </script>
</body>
</html>
